<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<body>
    <div class="divlogo">
        <img class="imagenmanpetrol" src="logo.png" alt="Descripción de la imagen"></a>
    </div>
    <div id="titulo_principal">
        <h1>PLANILLAS DE EPP</h1>
    </div>
    <div class="d-flex justify-content-center">
        <div class="mb-3 position-relative" style="width: 100%; max-width: 500px;">
            <input type="text" style="display:none" aria-hidden="true">
            <div class="input-group shadow-sm">
                <span class="input-group-text bg-primary text-white">#</span>
                <input type="text" id="busq_personas" class="form-control"
                    placeholder="Buscar por Nombre, Legajo o DNI..." onkeyup="filtrarPersonas()" autocomplete="off"
                    role="presentation">
            </div>
            <div id="visualizadorPersonas" class="list-group shadow-lg">
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-center">
        <div class="mb-3 position-relative" style="width: 100%; max-width: 500px;">
            <input type="text" style="display:none" aria-hidden="true">

            <div class="input-group shadow-sm">
                <span class="input-group-text bg-success text-white">#</span>

                <input type="text" id="busq_materiales" class="form-control" placeholder="Material, Modelo o Marca..."
                    onkeyup="filtrarMateriales()" autocomplete="off" role="presentation">

                <input type="number" id="cant_material" class="form-control" placeholder="Cant."
                    style="max-width: 80px;" min="1" value="1">
            </div>

            <div id="visualizadorMateriales" class="list-group position-absolute w-100 shadow-lg"
                style="z-index: 1000; top: 100%; max-height: 250px; overflow-y: auto;">
            </div>
        </div>
    </div>
    <div id="divBoton2">
        <button class="btn btn-primary btn-lg" id="boton_2">Agregar a la planilla</button>
    </div>

    <div id="contenedorTabla" class="table table-bordered table-hover table-sm">
        <table class="table table-striped table-hover">
            <thead class="table-hover">
                <tr>
                    <th>PERSONA</th>
                    <th>MATERIAL</th>
                    <th>MODELO</th>
                    <th>MARCA</th>
                    <th>CANTIDAD</th>
                    <th>FECHA</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla">

                    <td>&nbsp;</td>

                <tr>
                    <td>&nbsp;</td>

                <tr>
                    <td>&nbsp;</td>

                </tr>
                <tr>
                    <td>&nbsp;</td>
                    <td>&nbsp;</td>

                    <td>&nbsp;</td>
                    <td>&nbsp;</td>
                    <td>&nbsp;</td>
                </tr>
                <tr>
                    <td>&nbsp;</td>
                    <td>&nbsp;</td>
                    <td>&nbsp;</td>
                    <td>&nbsp;</td>
                    <td>&nbsp;</td>
                    <td>&nbsp;</td>
                </tr>
                <tr>
                    <td>&nbsp;</td>
                    <td>&nbsp;</td>
                    <td>&nbsp;</td>
                    <td>&nbsp;</td>
                    <td>&nbsp;</td>
                    <td>&nbsp;</td>
                </tr>
            </tbody>
        </table>
    </div>
    <div id="divradio" class="form-check form-switch">
        <input class="form-check-input" type="checkbox" role="switch" id="switchCheckDefault">
        <label class="form-check-label" for="switchCheckDefault">Tildar el check en caso de no devolver la
            planilla.</label>
    </div>
    <div id="contenedorSupervisor" class="expandible-oculto">
        <label for="inputSupervisor">Supervisor a cargo de las planillas:</label>
        <input type="text" id="inputSupervisor" class="form-control" placeholder="Nombre del supervisor...">
    </div>
    <div id="divBoton1">
        <button class="btn btn-primary btn-lg" id="boton_1">IMPRIMIR PLANILLA</button>
        <button class="btn btn-primary btn-lg" id="boton_4">BORRAR</button>
    </div>
